name: Brownout Notice Scraper

on:
  schedule:
    # PROD: Every 2 hours (at minute 43)
    # e.g. 12:43 AM, 2:43 AM, ... PHT (UTC+8)
    - cron: '43 */2 * * *'
    # DEV: Daily at 1:00 AM Philippine Time (UTC+8)
    # In UTC, this is 5:00 PM (17:00) the previous day
    - cron: '0 17 * * *'
  
  # Allow manual triggering from GitHub Actions tab
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Choose environment"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod

jobs:
  scrape:
    runs-on: ubuntu-latest
    # Map each scheduled cron to its environment; manual dispatch uses the input.
    # github.event.schedule holds the cron expression that triggered the run.
    environment: >-
      ${{
        github.event_name == 'schedule' && github.event.schedule == '0 17 * * *' && 'dev'
        || github.event_name == 'schedule' && 'prod'
        || inputs.target_environment
      }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate branch for target environment
        env:
          TARGET_ENV: ${{ github.event_name == 'schedule' && github.event.schedule == '0 17 * * *' && 'dev' || github.event_name == 'schedule' && 'prod' || inputs.target_environment }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          echo "Target environment: ${TARGET_ENV}"
          echo "Branch: ${BRANCH_NAME}"

          if [ "${TARGET_ENV}" = "prod" ] && [ "${BRANCH_NAME}" != "main" ]; then
            echo "ERROR: prod runs are allowed only from main branch."
            exit 1
          fi

          if [ "${TARGET_ENV}" = "dev" ] && [ "${BRANCH_NAME}" != "dev" ] && [ "${BRANCH_NAME}" != "main" ]; then
            echo "ERROR: dev runs are allowed only from dev or main branches."
            exit 1
          fi

          echo "Branch guard passed."
      
      - name: Run scraper
        working-directory: ./backend
        env:
          TARGET_ENV: ${{ github.event_name == 'schedule' && github.event.schedule == '0 17 * * *' && 'dev' || github.event_name == 'schedule' && 'prod' || inputs.target_environment }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "Running scraper for environment: ${TARGET_ENV}"
          python run_scraper.py
